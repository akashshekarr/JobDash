<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>JobDash — find your next role</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,900&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #0c0a14;
    --bg-soft: #15121f;
    --panel: #1b1726;
    --panel-2: #221d31;
    --ink: #f2eef9;
    --muted: #9a91b4;
    --line: #2c2640;
    --accent: #ff5f5f;
    --accent-2: #ffd166;
    --lime: #c6f25f;
    --radius: 18px;
    --shadow: 0 20px 60px rgba(0,0,0,.45);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Outfit', sans-serif;
    background:
      radial-gradient(900px 500px at 85% -10%, rgba(255,95,95,.18), transparent 60%),
      radial-gradient(700px 500px at 0% 0%, rgba(198,242,95,.10), transparent 55%),
      var(--bg);
    color: var(--ink);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }
  .wrap { max-width: 1180px; margin: 0 auto; padding: 38px 24px 80px; }

  header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 36px; }
  .brand { display: flex; align-items: baseline; gap: 12px; }
  .brand h1 {
    font-family: 'Fraunces', serif; font-weight: 900; font-size: 30px;
    letter-spacing: -.5px;
  }
  .brand h1 span { color: var(--accent); }
  .brand .tag { color: var(--muted); font-size: 13px; }
  .saved-pill {
    background: var(--panel); border: 1px solid var(--line); color: var(--ink);
    padding: 9px 16px; border-radius: 999px; font-size: 13px; font-weight: 500;
    cursor: pointer; transition: .2s; display: flex; align-items: center; gap: 8px;
  }
  .saved-pill:hover { border-color: var(--accent); }
  .saved-pill b { color: var(--accent-2); }

  .hero {
    font-family: 'Fraunces', serif; font-weight: 900; font-size: clamp(34px, 6vw, 62px);
    line-height: 1.02; letter-spacing: -1.5px; margin-bottom: 28px; max-width: 760px;
  }
  .hero em { font-style: italic; color: var(--lime); }

  .searchbar {
    background: var(--panel); border: 1px solid var(--line); border-radius: var(--radius);
    padding: 14px; display: grid; grid-template-columns: 1.7fr 1.1fr .9fr .9fr auto; gap: 10px;
    box-shadow: var(--shadow);
  }
  .field { display: flex; flex-direction: column; gap: 4px; padding: 6px 10px; position: relative; }
  .field label { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); }
  .field input, .field select {
    background: transparent; border: none; color: var(--ink); font-family: inherit;
    font-size: 15px; outline: none; width: 100%;
  }
  .field select { cursor: pointer; }
  .field select option { background: var(--panel-2); }
  .field + .field { border-left: 1px solid var(--line); }

  /* autocomplete dropdown */
  .suggest {
    position: absolute; top: 100%; left: 0; right: 0; margin-top: 8px; z-index: 30;
    background: var(--panel-2); border: 1px solid var(--line); border-radius: 12px;
    box-shadow: var(--shadow); overflow: hidden; display: none; max-height: 260px; overflow-y: auto;
  }
  .suggest.show { display: block; }
  .suggest div {
    padding: 11px 16px; font-size: 14px; cursor: pointer; color: var(--ink);
    border-bottom: 1px solid var(--line);
  }
  .suggest div:last-child { border-bottom: none; }
  .suggest div:hover, .suggest div.active { background: var(--accent); color: #150505; }
  .suggest div b { color: var(--accent-2); font-weight: 700; }
  .suggest div:hover b, .suggest div.active b { color: #150505; }
  .go {
    background: var(--accent); color: #150505; border: none; border-radius: 12px;
    font-family: inherit; font-weight: 700; font-size: 15px; padding: 0 26px; cursor: pointer;
    transition: .15s; letter-spacing: .2px;
  }
  .go:hover { transform: translateY(-1px); background: #ff7373; }
  .go:disabled { opacity: .5; cursor: wait; }

  .status { margin: 26px 4px 18px; color: var(--muted); font-size: 14px; min-height: 20px; }

  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(330px, 1fr)); gap: 16px; }
  .card {
    background: linear-gradient(180deg, var(--panel-2), var(--panel));
    border: 1px solid var(--line); border-radius: var(--radius); padding: 20px;
    display: flex; flex-direction: column; gap: 14px; position: relative;
    transition: .2s; animation: rise .5s both;
  }
  @keyframes rise { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: none; } }
  .card:hover { border-color: var(--accent); transform: translateY(-3px); }
  .card-top { display: flex; gap: 13px; align-items: flex-start; }
  .logo {
    width: 46px; height: 46px; border-radius: 11px; object-fit: contain; background: #fff;
    flex-shrink: 0; padding: 5px;
  }
  .logo.ph {
    background: var(--bg-soft); display: grid; place-items: center; color: var(--accent-2);
    font-family: 'Fraunces', serif; font-weight: 900; font-size: 20px;
  }
  .card h3 { font-size: 17px; font-weight: 600; line-height: 1.25; }
  .card .co { color: var(--muted); font-size: 13.5px; margin-top: 2px; }
  .chips { display: flex; flex-wrap: wrap; gap: 7px; }
  .chip {
    font-size: 11.5px; padding: 4px 10px; border-radius: 999px; background: var(--bg-soft);
    border: 1px solid var(--line); color: var(--muted);
  }
  .chip.remote { color: var(--lime); border-color: rgba(198,242,95,.3); }
  .chip.hybrid { color: var(--accent-2); border-color: rgba(255,209,102,.3); }
  .chip.posted { color: var(--muted); }
  .chip.salary { color: var(--lime); border-color: rgba(198,242,95,.3); }

  /* applied state */
  .card.applied { border-color: rgba(198,242,95,.45); }
  .card.applied::after {
    content: "✓ Applied"; position: absolute; top: 14px; right: 14px;
    font-size: 10.5px; font-weight: 700; color: #142b00; background: var(--lime);
    padding: 3px 9px; border-radius: 999px; letter-spacing: .5px;
  }
  .appliedbtn {
    background: var(--bg-soft); border: 1px solid var(--line); color: var(--muted);
    border-radius: 11px; cursor: pointer; font-family: inherit; font-size: 12.5px;
    font-weight: 600; padding: 0 12px; transition: .15s; flex-shrink: 0;
  }
  .appliedbtn:hover { border-color: var(--lime); color: var(--lime); }
  .appliedbtn.on { background: rgba(198,242,95,.12); border-color: var(--lime); color: var(--lime); }

  /* search history */
  .history { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; margin: 18px 4px 0; }
  .hist-label { color: var(--muted); font-size: 12px; letter-spacing: .5px; }
  .hist-chip {
    background: var(--panel); border: 1px solid var(--line); color: var(--ink);
    border-radius: 999px; padding: 6px 13px; font-size: 12.5px; font-family: inherit;
    cursor: pointer; transition: .15s;
  }
  .hist-chip:hover { border-color: var(--accent-2); color: var(--accent-2); }
  .desc { color: var(--muted); font-size: 13px; line-height: 1.5; flex-grow: 1; }
  .card-foot { display: flex; gap: 10px; align-items: center; margin-top: 2px; }
  .apply {
    flex-grow: 1; text-align: center; background: var(--ink); color: #120f1c; text-decoration: none;
    font-weight: 600; font-size: 14px; padding: 10px; border-radius: 11px; transition: .15s;
  }
  .apply:hover { background: var(--accent-2); }
  .save {
    background: var(--bg-soft); border: 1px solid var(--line); color: var(--muted);
    width: 42px; height: 42px; border-radius: 11px; cursor: pointer; font-size: 18px;
    transition: .15s; flex-shrink: 0;
  }
  .save:hover { border-color: var(--accent); color: var(--accent); }
  .save.on { color: var(--accent); border-color: var(--accent); background: rgba(255,95,95,.1); }
  .src { font-size: 11px; color: var(--muted); opacity: .7; }

  .more {
    display: block; margin: 34px auto 0; background: var(--panel); border: 1px solid var(--line);
    color: var(--ink); font-family: inherit; font-size: 15px; font-weight: 500; padding: 13px 34px;
    border-radius: 999px; cursor: pointer; transition: .2s;
  }
  .more:hover { border-color: var(--lime); }

  .empty { text-align: center; color: var(--muted); padding: 60px 20px; }
  .empty .big { font-family: 'Fraunces', serif; font-size: 22px; color: var(--ink); margin-bottom: 6px; }

  /* saved drawer */
  .drawer { position: fixed; inset: 0; background: rgba(0,0,0,.6); display: none; z-index: 50; }
  .drawer.open { display: block; }
  .drawer-panel {
    position: absolute; right: 0; top: 0; height: 100%; width: min(420px, 90vw);
    background: var(--bg-soft); border-left: 1px solid var(--line); padding: 26px;
    overflow-y: auto; box-shadow: var(--shadow);
  }
  .drawer-panel h2 { font-family: 'Fraunces', serif; font-size: 24px; margin-bottom: 18px; display: flex; justify-content: space-between; }
  .drawer-panel h2 .x { cursor: pointer; color: var(--muted); }
  .mini { background: var(--panel); border: 1px solid var(--line); border-radius: 12px; padding: 14px; margin-bottom: 11px; }
  .mini h4 { font-size: 14.5px; font-weight: 600; }
  .mini .co { color: var(--muted); font-size: 12.5px; margin: 3px 0 9px; }
  .mini-acts { display: flex; gap: 8px; }
  .mini-acts a { font-size: 12.5px; color: var(--accent-2); text-decoration: none; }
  .mini-acts button { background: none; border: none; color: var(--accent); cursor: pointer; font-size: 12.5px; font-family: inherit; }

  @media (max-width: 720px) {
    .searchbar { grid-template-columns: 1fr; }
    .field + .field { border-left: none; border-top: 1px solid var(--line); }
  }

  /* ---- Auth / login screen ---- */
  #authScreen {
    position: fixed; inset: 0; display: grid; place-items: center; z-index: 100;
    background:
      radial-gradient(900px 500px at 85% -10%, rgba(255,95,95,.18), transparent 60%),
      radial-gradient(700px 500px at 0% 0%, rgba(198,242,95,.10), transparent 55%),
      var(--bg);
    padding: 24px;
  }
  .auth-card {
    width: min(420px, 100%); background: var(--panel); border: 1px solid var(--line);
    border-radius: var(--radius); padding: 38px 34px; box-shadow: var(--shadow);
  }
  .auth-card h1 {
    font-family: 'Fraunces', serif; font-weight: 900; font-size: 32px; margin-bottom: 6px;
  }
  .auth-card h1 span { color: var(--accent); }
  .auth-card .sub { color: var(--muted); font-size: 14px; margin-bottom: 26px; }
  .auth-field { margin-bottom: 14px; }
  .auth-field label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 6px; letter-spacing: .5px; }
  .auth-field input {
    width: 100%; background: var(--bg-soft); border: 1px solid var(--line); border-radius: 11px;
    color: var(--ink); font-family: inherit; font-size: 15px; padding: 12px 14px; outline: none;
    transition: .15s;
  }
  .auth-field input:focus { border-color: var(--accent); }
  .auth-btn {
    width: 100%; background: var(--accent); color: #150505; border: none; border-radius: 11px;
    font-family: inherit; font-weight: 700; font-size: 15px; padding: 13px; cursor: pointer;
    transition: .15s; margin-top: 6px;
  }
  .auth-btn:hover { background: #ff7373; }
  .auth-btn:disabled { opacity: .6; cursor: wait; }
  .google-btn {
    width: 100%; background: #fff; color: #1f1f1f; border: none; border-radius: 11px;
    font-family: inherit; font-weight: 600; font-size: 15px; padding: 12px; cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 10px; transition: .15s;
  }
  .google-btn:hover { background: #f1f1f1; }
  .google-btn svg { width: 18px; height: 18px; }
  .divider { display: flex; align-items: center; gap: 12px; color: var(--muted); font-size: 12px; margin: 20px 0; }
  .divider::before, .divider::after { content: ""; flex: 1; height: 1px; background: var(--line); }
  .auth-toggle { text-align: center; margin-top: 20px; font-size: 14px; color: var(--muted); }
  .auth-toggle a { color: var(--accent-2); cursor: pointer; text-decoration: none; font-weight: 600; }
  .auth-msg { font-size: 13px; margin-top: 14px; min-height: 18px; text-align: center; }
  .auth-msg.err { color: var(--accent); }
  .auth-msg.ok { color: var(--lime); }
  .user-pill {
    background: var(--panel); border: 1px solid var(--line); color: var(--ink);
    padding: 9px 14px; border-radius: 999px; font-size: 13px; display: flex; align-items: center; gap: 8px;
  }
  .user-pill button {
    background: none; border: none; color: var(--accent); cursor: pointer; font-family: inherit;
    font-size: 13px; font-weight: 600;
  }
  .header-right { display: flex; align-items: center; gap: 10px; }
  #app { display: none; }
</style>
</head>
<body>

<!-- Supabase JS (v2) -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<!-- ===== LOGIN SCREEN ===== -->
<div id="authScreen">
  <div class="auth-card">
    <h1>Job<span>Dash</span></h1>
    <div class="sub" id="authSub">Sign in to search and save jobs.</div>

    <button class="google-btn" onclick="signInGoogle()">
      <svg viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
      Continue with Google
    </button>

    <div class="divider">or</div>

    <div class="auth-field">
      <label>Email</label>
      <input id="authEmail" type="email" placeholder="you@example.com" />
    </div>
    <div class="auth-field">
      <label>Password</label>
      <input id="authPassword" type="password" placeholder="••••••••" />
    </div>
    <button class="auth-btn" id="authSubmit" onclick="submitAuth()">Sign in</button>

    <div class="auth-msg" id="authMsg"></div>

    <div class="auth-toggle" id="authToggle">
      New here? <a onclick="toggleMode()">Create an account</a>
    </div>
  </div>
</div>

<!-- ===== MAIN APP ===== -->
<div id="app">
<div class="wrap">
  <header>
    <div class="brand">
      <h1>Job<span>Dash</span></h1>
      <span class="tag">live roles · one search</span>
    </div>
    <div class="header-right">
      <button class="saved-pill" onclick="openDrawer()">★ Saved <b id="savedCount">0</b></button>
      <div class="user-pill"><span id="userEmail">—</span><button onclick="signOut()">Sign out</button></div>
    </div>
  </header>

  <div class="hero">Search once.<br>See <em>every</em> opening.</div>

  <div class="searchbar">
    <div class="field">
      <label>Keyword / title</label>
      <input id="q" placeholder="e.g. data engineer" autocomplete="off" />
      <div class="suggest" id="qSuggest"></div>
    </div>
    <div class="field">
      <label>Location</label>
      <input id="loc" placeholder="e.g. Bengaluru" autocomplete="off" />
      <div class="suggest" id="locSuggest"></div>
    </div>
    <div class="field">
      <label>Type</label>
      <select id="type">
        <option value="">Any</option>
        <option value="FULLTIME">Full-time</option>
        <option value="PARTTIME">Part-time</option>
        <option value="CONTRACTOR">Contract</option>
        <option value="INTERN">Internship</option>
      </select>
    </div>
    <div class="field">
      <label>Work mode</label>
      <select id="arrangement">
        <option value="">Any</option>
        <option value="ONSITE">On-site</option>
        <option value="HYBRID">Hybrid</option>
        <option value="WFH">WFH</option>
      </select>
    </div>
    <button class="go" id="go" onclick="newSearch()">Search</button>
  </div>

  <div class="history" id="historyBox"></div>

  <div class="status" id="status">Type a role and hit search to pull live listings.</div>
  <div class="grid" id="grid"></div>
  <button class="more" id="more" style="display:none" onclick="loadMore()">Load more</button>
</div>

<div class="drawer" id="drawer" onclick="if(event.target===this)closeDrawer()">
  <div class="drawer-panel">
    <h2>Saved jobs <span class="x" onclick="closeDrawer()">✕</span></h2>
    <div id="savedList"></div>
  </div>
</div>
</div><!-- /#app -->

<script>
/* ===== Supabase setup ===== */
const SUPABASE_URL = "https://lduwocrmzhkxvsgqdwle.supabase.co";
const SUPABASE_KEY = "sb_publishable_G_wfess3lj59TsRIcXGCOw_l1szEPCh";
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let page = 1, lastQ = "", lastLoc = "", lastType = "", lastArr = "", busy = false;
let saved = [];          // loaded from Supabase for the logged-in user
let applied = [];        // array of job_ids the user marked applied
let searchHistory = [];  // recent searches
let authMode = "signin"; // or "signup"
let currentUser = null;

const $ = id => document.getElementById(id);

/* ===== Auth flow ===== */
function toggleMode(){
  authMode = authMode === "signin" ? "signup" : "signin";
  $("authSubmit").textContent = authMode === "signin" ? "Sign in" : "Create account";
  $("authSub").textContent = authMode === "signin"
    ? "Sign in to search and save jobs."
    : "Create an account to save jobs across devices.";
  $("authToggle").innerHTML = authMode === "signin"
    ? 'New here? <a onclick="toggleMode()">Create an account</a>'
    : 'Already have an account? <a onclick="toggleMode()">Sign in</a>';
  setAuthMsg("");
}

function setAuthMsg(text, kind){
  const el = $("authMsg");
  el.textContent = text;
  el.className = "auth-msg" + (kind ? " " + kind : "");
}

async function submitAuth(){
  const email = $("authEmail").value.trim();
  const password = $("authPassword").value;
  if(!email || !password){ setAuthMsg("Enter email and password.", "err"); return; }
  $("authSubmit").disabled = true;
  setAuthMsg(authMode === "signin" ? "Signing in…" : "Creating account…");

  try {
    if(authMode === "signin"){
      const { error } = await sb.auth.signInWithPassword({ email, password });
      if(error) throw error;
    } else {
      const { error } = await sb.auth.signUp({ email, password });
      if(error) throw error;
      setAuthMsg("Account created. If email confirmation is on, check your inbox, then sign in.", "ok");
      $("authSubmit").disabled = false;
      return;
    }
  } catch(err){
    setAuthMsg(err.message || "Authentication failed.", "err");
    $("authSubmit").disabled = false;
  }
}

async function signInGoogle(){
  const { error } = await sb.auth.signInWithOAuth({
    provider: "google",
    options: { redirectTo: window.location.origin }
  });
  if(error) setAuthMsg(error.message, "err");
}

async function signOut(){
  await sb.auth.signOut();
  // onAuthStateChange handles the UI switch.
}

// React to login/logout.
sb.auth.onAuthStateChange((_event, session) => {
  if(session && session.user){
    currentUser = session.user;
    showApp();
  } else {
    currentUser = null;
    showLogin();
  }
});

function showApp(){
  $("authScreen").style.display = "none";
  $("app").style.display = "block";
  $("userEmail").textContent = currentUser.email || "Signed in";
  $("authSubmit").disabled = false;
  loadSaved();
  loadApplied();
  loadHistory();
}

function showLogin(){
  $("app").style.display = "none";
  $("authScreen").style.display = "grid";
  saved = []; renderSavedCount();
}

function renderSavedCount(){ $("savedCount").textContent = saved.length; }

/* ===== Saved jobs via Supabase ===== */
async function loadSaved(){
  const { data, error } = await sb
    .from("saved_jobs")
    .select("job_id, job_data")
    .order("created_at", { ascending: false });
  if(error){ console.error(error); return; }
  saved = (data || []).map(r => r.job_data);
  renderSavedCount();
  // refresh any visible star states
  document.querySelectorAll(".card").forEach(c => {
    const id = c.dataset.jobId;
    const btn = c.querySelector(".save");
    if(!btn) return;
    const on = saved.some(s => s.id === id);
    btn.classList.toggle("on", on);
    btn.textContent = on ? "★" : "☆";
  });
}

async function toggleSave(job, btn){
  const isSaved = saved.some(s => s.id === job.id);
  try {
    if(isSaved){
      const { error } = await sb.from("saved_jobs").delete()
        .eq("user_id", currentUser.id).eq("job_id", job.id);
      if(error) throw error;
      saved = saved.filter(s => s.id !== job.id);
      btn.classList.remove("on"); btn.textContent = "☆";
    } else {
      const { error } = await sb.from("saved_jobs").insert({
        user_id: currentUser.id, job_id: job.id, job_data: job
      });
      if(error) throw error;
      saved.push(job);
      btn.classList.add("on"); btn.textContent = "★";
    }
    renderSavedCount();
  } catch(err){
    console.error(err);
    alert("Couldn't update saved job: " + (err.message || "error"));
  }
}

/* ===== Applied toggle (Supabase) ===== */
async function loadApplied(){
  const { data, error } = await sb.from("applied_jobs").select("job_id");
  if(error){ console.error(error); return; }
  applied = (data || []).map(r => r.job_id);
}

async function toggleApplied(job, btn, card){
  const isApplied = applied.includes(job.id);
  try {
    if(isApplied){
      const { error } = await sb.from("applied_jobs").delete()
        .eq("user_id", currentUser.id).eq("job_id", job.id);
      if(error) throw error;
      applied = applied.filter(id => id !== job.id);
      btn.classList.remove("on"); btn.textContent = "Mark applied";
      card.classList.remove("applied");
    } else {
      const { error } = await sb.from("applied_jobs").insert({
        user_id: currentUser.id, job_id: job.id
      });
      if(error) throw error;
      applied.push(job.id);
      btn.classList.add("on"); btn.textContent = "✓ Applied";
      card.classList.add("applied");
    }
  } catch(err){
    console.error(err);
    alert("Couldn't update applied status: " + (err.message || "error"));
  }
}

/* ===== Search history (Supabase) ===== */
async function loadHistory(){
  const { data, error } = await sb.from("search_history")
    .select("query, location, emp_type, arrangement, created_at")
    .order("created_at", { ascending: false }).limit(8);
  if(error){ console.error(error); return; }
  searchHistory = data || [];
  renderHistory();
}

function renderHistory(){
  const box = $("historyBox");
  if(!box) return;
  if(!searchHistory.length){ box.innerHTML = ""; return; }
  box.innerHTML = `<span class="hist-label">Recent:</span>` + searchHistory.map((h, i) => {
    const label = [h.query, h.location].filter(Boolean).join(" · ");
    return `<button class="hist-chip" data-i="${i}">${label}</button>`;
  }).join("");
  [...box.querySelectorAll(".hist-chip")].forEach(el => {
    el.onclick = () => {
      const h = searchHistory[+el.dataset.i];
      $("q").value = h.query || "";
      $("loc").value = h.location || "";
      $("type").value = h.emp_type || "";
      $("arrangement").value = h.arrangement || "";
      newSearch();
    };
  });
}

async function saveHistory(){
  try {
    await sb.from("search_history").insert({
      user_id: currentUser.id, query: lastQ, location: lastLoc,
      emp_type: lastType, arrangement: lastArr
    });
    loadHistory();
  } catch(err){ console.error(err); }
}

async function newSearch(){
  const q = $("q").value.trim();
  if(!q){ $("status").textContent = "Enter a keyword first."; return; }
  page = 1; lastQ = q; lastLoc = $("loc").value.trim();
  lastType = $("type").value; lastArr = $("arrangement").value;
  closeSuggest();
  $("grid").innerHTML = "";
  await fetchJobs(true);
}

async function loadMore(){ page++; await fetchJobs(false); }

async function fetchJobs(fresh){
  if(busy) return;
  busy = true; $("go").disabled = true;
  $("status").textContent = fresh ? "Searching live listings…" : "Loading more…";
  $("more").style.display = "none";

  const params = new URLSearchParams({ q: lastQ, page });
  if(lastLoc) params.set("location", lastLoc);
  if(lastType) params.set("employment_type", lastType);
  if(lastArr) params.set("work_arrangement", lastArr);

  try {
    const res = await fetch("/api/search?" + params);
    if(!res.ok){ const e = await res.json().catch(()=>({})); throw new Error(e.detail || res.status); }
    const data = await res.json();
    if(fresh && data.jobs.length === 0){
      $("grid").innerHTML = `<div class="empty"><div class="big">No roles found</div>Try a broader keyword or clear the location.</div>`;
      $("status").textContent = "";
    } else {
      data.jobs.forEach(addCard);
      $("status").textContent = `Showing results for “${lastQ}”${lastLoc ? " in " + lastLoc : ""}.`;
      $("more").style.display = data.jobs.length ? "block" : "none";
      if(fresh) saveHistory();
    }
  } catch(err){
    $("status").textContent = "⚠ " + err.message;
  } finally {
    busy = false; $("go").disabled = false;
  }
}

function timeAgo(iso){
  if(!iso) return "";
  const then = new Date(iso);
  if(isNaN(then)) return "";
  const mins = Math.floor((Date.now() - then) / 60000);
  if(mins < 1) return "just now";
  if(mins < 60) return mins + "m ago";
  const hrs = Math.floor(mins / 60);
  if(hrs < 24) return hrs + "h ago";
  const days = Math.floor(hrs / 24);
  if(days < 30) return days + (days === 1 ? " day ago" : " days ago");
  const months = Math.floor(days / 30);
  return months + (months === 1 ? " month ago" : " months ago");
}

function addCard(job){
  const isSaved = saved.some(s => s.id === job.id);
  const isApplied = applied.includes(job.id);
  const logo = job.logo
    ? `<img class="logo" src="${job.logo}" onerror="this.outerHTML='<div class=\\'logo ph\\'>${(job.company||'?')[0]}</div>'" />`
    : `<div class="logo ph">${(job.company||'?')[0]}</div>`;
  const chips = [];
  if(job.type) chips.push(`<span class="chip">${job.type.replace('_',' ')}</span>`);
  if(job.arrangement === "WFH") chips.push(`<span class="chip remote">WFH</span>`);
  else if(job.arrangement === "Hybrid") chips.push(`<span class="chip hybrid">Hybrid</span>`);
  else if(job.arrangement) chips.push(`<span class="chip">On-site</span>`);
  chips.push(`<span class="chip">${job.location}</span>`);
  if(job.salary) chips.push(`<span class="chip salary">💰 ${job.salary}</span>`);
  const ago = timeAgo(job.posted);
  if(ago) chips.push(`<span class="chip posted">🕒 ${ago}</span>`);

  const el = document.createElement("div");
  el.className = "card" + (isApplied ? " applied" : "");
  el.dataset.jobId = job.id;
  el.innerHTML = `
    <div class="card-top">
      ${logo}
      <div><h3>${job.title || "Untitled role"}</h3><div class="co">${job.company || "Unknown company"}</div></div>
    </div>
    <div class="chips">${chips.join("")}</div>
    <div class="desc">${(job.description || "No description provided.").replace(/</g,"&lt;")}…</div>
    <div class="card-foot">
      <a class="apply" href="${job.apply || '#'}" target="_blank" rel="noopener">Apply ↗</a>
      <button class="appliedbtn ${isApplied?'on':''}" title="Mark as applied">${isApplied?'✓ Applied':'Mark applied'}</button>
      <button class="save ${isSaved?'on':''}" title="Save">${isSaved?'★':'☆'}</button>
    </div>
    <div class="src">via ${job.publisher || "JSearch"}</div>`;
  el.querySelector(".save").onclick = e => toggleSave(job, e.currentTarget);
  el.querySelector(".appliedbtn").onclick = e => toggleApplied(job, e.currentTarget, el);
  $("grid").appendChild(el);
}

function openDrawer(){
  const list = $("savedList");
  list.innerHTML = saved.length ? "" : `<div class="empty">No saved jobs yet.</div>`;
  saved.forEach(job => {
    const m = document.createElement("div");
    m.className = "mini";
    m.innerHTML = `<h4>${job.title}</h4><div class="co">${job.company} · ${job.location}</div>
      <div class="mini-acts"><a href="${job.apply||'#'}" target="_blank" rel="noopener">Apply ↗</a>
      <button>Remove</button></div>`;
    m.querySelector("button").onclick = async () => {
      try {
        const { error } = await sb.from("saved_jobs").delete()
          .eq("user_id", currentUser.id).eq("job_id", job.id);
        if(error) throw error;
        saved = saved.filter(s => s.id !== job.id);
        renderSavedCount(); openDrawer();
        // un-star a matching visible card
        const card = document.querySelector(`.card[data-job-id="${CSS.escape(job.id)}"] .save`);
        if(card){ card.classList.remove("on"); card.textContent = "☆"; }
      } catch(err){
        alert("Couldn't remove: " + (err.message || "error"));
      }
    };
    list.appendChild(m);
  });
  $("drawer").classList.add("open");
}
function closeDrawer(){ $("drawer").classList.remove("open"); }

$("q").addEventListener("keydown", e => { if(e.key === "Enter" && !$("qSuggest").classList.contains("show")) newSearch(); });
$("loc").addEventListener("keydown", e => { if(e.key === "Enter" && !$("locSuggest").classList.contains("show")) newSearch(); });

const TITLES = [
  "Software Engineer","Senior Software Engineer","Frontend Developer","Backend Developer",
  "Full Stack Developer","Data Engineer","Data Analyst","Data Scientist","Machine Learning Engineer",
  "DevOps Engineer","Cloud Engineer","Site Reliability Engineer","QA Engineer","Test Automation Engineer",
  "Cybersecurity Analyst","Security Engineer","Information Security Analyst","Penetration Tester",
  "Product Manager","Project Manager","Program Manager","Business Analyst","Scrum Master",
  "UI/UX Designer","Product Designer","Graphic Designer","Mobile Developer","Android Developer",
  "iOS Developer","Database Administrator","Network Engineer","Systems Administrator","IT Support",
  "Solutions Architect","Engineering Manager","Technical Lead","AI Engineer","Prompt Engineer",
  "Digital Marketing Manager","SEO Specialist","Content Writer","HR Manager","Recruiter",
  "Financial Analyst","Accountant","Sales Executive","Customer Success Manager","Operations Manager"
];
const CITIES = [
  "Bengaluru","Hyderabad","Mumbai","Pune","Chennai","Delhi","Gurgaon","Noida","Kolkata","Ahmedabad",
  "Jaipur","Kochi","Coimbatore","Indore","Chandigarh","Thiruvananthapuram","Visakhapatnam","Nagpur",
  "Remote","London","New York","San Francisco","Singapore","Dubai","Toronto","Berlin","Sydney","Bangalore"
];

function setupAutocomplete(inputId, boxId, source){
  const input = $(inputId), box = $(boxId);
  let activeIdx = -1, items = [];

  function render(matches){
    activeIdx = -1; items = matches;
    if(!matches.length){ box.classList.remove("show"); box.innerHTML = ""; return; }
    const val = input.value.trim().toLowerCase();
    box.innerHTML = matches.map(m => {
      const i = m.toLowerCase().indexOf(val);
      const html = i >= 0
        ? m.slice(0,i) + "<b>" + m.slice(i, i+val.length) + "</b>" + m.slice(i+val.length)
        : m;
      return `<div>${html}</div>`;
    }).join("");
    [...box.children].forEach((el, idx) => {
      el.onclick = () => { input.value = matches[idx]; closeSuggest(); input.focus(); };
    });
    box.classList.add("show");
  }

  input.addEventListener("input", () => {
    const v = input.value.trim().toLowerCase();
    if(!v){ box.classList.remove("show"); return; }
    render(source.filter(s => s.toLowerCase().includes(v)).slice(0, 8));
  });

  input.addEventListener("keydown", e => {
    if(!box.classList.contains("show")) return;
    const els = [...box.children];
    if(e.key === "ArrowDown"){ e.preventDefault(); activeIdx = Math.min(activeIdx+1, els.length-1); }
    else if(e.key === "ArrowUp"){ e.preventDefault(); activeIdx = Math.max(activeIdx-1, 0); }
    else if(e.key === "Enter" && activeIdx >= 0){ e.preventDefault(); input.value = items[activeIdx]; closeSuggest(); return; }
    else if(e.key === "Escape"){ closeSuggest(); return; }
    els.forEach((el,i) => el.classList.toggle("active", i === activeIdx));
  });

  input.addEventListener("blur", () => setTimeout(() => box.classList.remove("show"), 150));
}

function closeSuggest(){
  $("qSuggest").classList.remove("show");
  $("locSuggest").classList.remove("show");
}

setupAutocomplete("q", "qSuggest", TITLES);
setupAutocomplete("loc", "locSuggest", CITIES);
